<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALC</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0f4ff;
      --surface:  #ffffff;
      --panel:    #e8edf8;
      --border:   #d0d8ee;
      --accent:   #5b5ef5;
      --accent2:  #ff5c87;
      --text:     #1a1d2e;
      --muted:    #8892b0;
      --btn-bg:   #f7f9ff;
      --btn-h:    #edf0ff;
      --btn-op:   #ede8ff;
      --btn-oph:  #dfd8ff;
      --btn-eq:   #5b5ef5;
      --btn-eqh:  #4a4de0;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      color: var(--text);
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,94,245,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,94,245,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .shell {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(91,94,245,0.12), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 4px;
      color: var(--accent);
    }
    .header-dots { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #febc2e; }
    .dot-g { background: #28c840; }

    .display {
      padding: 20px 20px 14px;
      background: linear-gradient(160deg, #f0f4ff 0%, #e8edf8 100%);
      border-bottom: 1px solid var(--border);
    }
    .display-history {
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
      text-align: right;
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 6px;
    }
    .display-expr {
      font-size: 13px;
      color: #6677aa;
      min-height: 18px;
      text-align: right;
      letter-spacing: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }
    .display-main {
      font-size: 42px;
      text-align: right;
      line-height: 1;
      color: var(--text);
      letter-spacing: -1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-height: 50px;
      transition: color 0.1s;
    }
    .display-main.result-flash { color: var(--accent); }

    .indicator { height: 3px; background: var(--border); }
    .indicator-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.15s ease; border-radius: 0 2px 2px 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    .btn {
      background: var(--btn-bg);
      border: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 17px;
      padding: 0;
      height: 68px;
      cursor: pointer;
      transition: background 0.08s, transform 0.06s, box-shadow 0.08s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 1px;
    }
    .btn:hover { background: var(--btn-h); }
    .btn:active { transform: scale(0.94); }

    .btn.op { background: var(--btn-op); color: var(--accent); font-size: 20px; font-weight: bold; }
    .btn.op:hover { background: var(--btn-oph); }
    .btn.op.active-op { background: #ddd8ff; box-shadow: inset 0 0 0 2px var(--accent); }

    .btn.fn { background: #eef1fb; color: #5566aa; font-size: 13px; letter-spacing: 2px; }
    .btn.fn:hover { background: #e4e8f5; color: #3344aa; }

    .btn.eq { background: var(--btn-eq); color: #ffffff; font-size: 24px; font-weight: 900; box-shadow: 0 4px 14px rgba(91,94,245,0.35); }
    .btn.eq:hover { background: var(--btn-eqh); box-shadow: 0 4px 18px rgba(91,94,245,0.5); }

    .btn.wide { grid-column: span 2; justify-content: flex-start; padding-left: 26px; }

    .footer {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hint { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .hint span { background: var(--border); padding: 1px 5px; border-radius: 3px; color: #667; margin-right: 3px; }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="header-title">CALC</div>
    <div style="width:42px"></div>
  </div>

  <div class="display">
    <div class="display-history" id="history">&nbsp;</div>
    <div class="display-expr" id="expr">&nbsp;</div>
    <div class="display-main" id="main">0</div>
  </div>

  <div class="indicator"><div class="indicator-bar" id="ibar"></div></div>

  <div class="grid">
    <button class="btn fn" data-action="ac">AC</button>
    <button class="btn fn" data-action="sign">&#177;</button>
    <button class="btn fn" data-action="pct">%</button>
    <button class="btn op" data-action="op" data-op="&#247;">&#247;</button>

    <button class="btn" data-action="num" data-val="7">7</button>
    <button class="btn" data-action="num" data-val="8">8</button>
    <button class="btn" data-action="num" data-val="9">9</button>
    <button class="btn op" data-action="op" data-op="&#215;">&#215;</button>

    <button class="btn" data-action="num" data-val="4">4</button>
    <button class="btn" data-action="num" data-val="5">5</button>
    <button class="btn" data-action="num" data-val="6">6</button>
    <button class="btn op" data-action="op" data-op="&#8722;">&#8722;</button>

    <button class="btn" data-action="num" data-val="1">1</button>
    <button class="btn" data-action="num" data-val="2">2</button>
    <button class="btn" data-action="num" data-val="3">3</button>
    <button class="btn op" data-action="op" data-op="+">+</button>

    <button class="btn wide" data-action="num" data-val="0">0</button>
    <button class="btn" data-action="dot">.</button>
    <button class="btn eq" data-action="eq">=</button>
  </div>

  <div class="footer">
    <div class="hint"><span>ESC</span>clear</div>
    <div class="hint"><span>&#9003;</span>delete</div>
    <div class="hint"><span>Enter</span>equals</div>
    <div class="hint"><span>0&#8211;9 . &#177; %</span>input</div>
  </div>
</div>

<script>
  let current = '0', pending = null, justEvaled = false, hasDecimal = false;
  const mainEl = document.getElementById('main');
  const exprEl = document.getElementById('expr');
  const histEl = document.getElementById('history');
  const ibar   = document.getElementById('ibar');
  const opBtns = document.querySelectorAll('.btn.op');

  function fmt(n) {
    const num = parseFloat(n);
    if (isNaN(num)) return 'Error';
    if (!isFinite(num)) return num > 0 ? '\u221e' : '-\u221e';
    const s = parseFloat(num.toPrecision(12)).toString();
    if (!s.includes('.') && !s.includes('e')) return Number(s).toLocaleString('en-US');
    return s.length > 14 ? num.toPrecision(10) : s;
  }

  function setDisplay(val, flash) {
    mainEl.textContent = fmt(val);
    if (flash) { mainEl.classList.add('result-flash'); setTimeout(() => mainEl.classList.remove('result-flash'), 300); }
    const len = mainEl.textContent.replace(/[^0-9]/g, '').length;
    ibar.style.width = Math.min(100, len * 10) + '%';
  }

  function updateActiveOp(op) { opBtns.forEach(b => b.classList.toggle('active-op', b.dataset.op === op)); }
  function buildExpr() { return pending ? fmt(pending.value) + ' ' + pending.op : ''; }

  function compute(a, op, b) {
    a = parseFloat(a); b = parseFloat(b);
    if (op === '+') return a + b;
    if (op === '\u2212') return a - b;
    if (op === '\u00d7') return a * b;
    if (op === '\u00f7') return b === 0 ? Infinity : a / b;
  }

  function inputDigit(d) {
    if (justEvaled) { current = d; justEvaled = false; pending = null; }
    else if (current === '0') current = d;
    else if (current.length < 15) current += d;
    setDisplay(current);
    exprEl.textContent = buildExpr() || '\u00a0';
  }

  function inputDot() {
    if (justEvaled) { current = '0.'; justEvaled = false; hasDecimal = true; return setDisplay(current); }
    if (!hasDecimal) { current += '.'; hasDecimal = true; }
    mainEl.textContent = current;
    exprEl.textContent = buildExpr() || '\u00a0';
  }

  function inputOp(op) {
    if (pending && !justEvaled) {
      const result = compute(pending.value, pending.op, parseFloat(current));
      histEl.textContent = fmt(pending.value) + ' ' + pending.op + ' ' + fmt(current) + ' =';
      pending = { value: result, op };
      current = '0'; hasDecimal = false;
      setDisplay(result);
    } else {
      pending = { value: parseFloat(current), op };
      current = '0'; hasDecimal = false;
    }
    justEvaled = false;
    updateActiveOp(op);
    exprEl.textContent = buildExpr();
  }

  function doEquals() {
    if (!pending) return;
    const a = pending.value, op = pending.op, b = parseFloat(current);
    const result = compute(a, op, b);
    histEl.textContent = fmt(a) + ' ' + op + ' ' + fmt(b) + ' =';
    setDisplay(result, true);
    exprEl.textContent = '\u00a0';
    current = String(parseFloat(result.toPrecision(12)));
    hasDecimal = current.includes('.');
    pending = null; justEvaled = true;
    updateActiveOp(null);
  }

  function doAC() {
    current = '0'; pending = null; justEvaled = false; hasDecimal = false;
    setDisplay(0); exprEl.textContent = '\u00a0'; histEl.textContent = '\u00a0';
    updateActiveOp(null); ibar.style.width = '0%';
  }

  function doSign() { current = String(parseFloat(current) * -1); setDisplay(current); }
  function doPct() { current = String(parseFloat(current) / 100); hasDecimal = current.includes('.'); setDisplay(current); }

  function doBackspace() {
    if (justEvaled) return;
    if (current.length <= 1) { current = '0'; hasDecimal = false; }
    else { if (current.slice(-1) === '.') hasDecimal = false; current = current.slice(0, -1); }
    setDisplay(current);
  }

  document.querySelector('.grid').addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const { action, val, op } = btn.dataset;
    if (action === 'num') inputDigit(val);
    else if (action === 'dot') inputDot();
    else if (action === 'op') inputOp(op);
    else if (action === 'eq') doEquals();
    else if (action === 'ac') doAC();
    else if (action === 'sign') doSign();
    else if (action === 'pct') doPct();
  });

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('\u2212');
    else if (e.key === '*') inputOp('\u00d7');
    else if (e.key === '/') { e.preventDefault(); inputOp('\u00f7'); }
    else if (e.key === 'Enter' || e.key === '=') doEquals();
    else if (e.key === 'Escape') doAC();
    else if (e.key === 'Backspace') doBackspace();
    else if (e.key === '%') doPct();
  });

  setDisplay(0);
</script>
</body>
</html>
